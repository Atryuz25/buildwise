version: '3.8'
services:
  db:
    image: postgres:16
    container_name: consti_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: consti
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: consti_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata:
