<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>BuildWise Report</title>
  <style>
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 40px; color: #333; }
    h1 { color: #f97316; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 30px; }
    h2 { color: #0284c7; margin-top: 30px; }
    .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
    .date { font-size: 14px; color: #64748b; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { border: 1px solid #cbd5e1; padding: 10px; text-align: left; }
    th { background-color: #f8fafc; font-weight: bold; }
    .metric { font-size: 24px; font-weight: bold; color: #16a34a; }
    .metric.negative { color: #dc2626; }
    .footer { margin-top: 50px; font-size: 12px; color: #94a3b8; text-align: center; border-top: 1px solid #e2e8f0; padding-top: 20px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>BuildWise - {{reportTitle}}</h1>
    <div class="date">Date: {{date}}</div>
  </div>

  <div class="content">
    {{{content}}}
  </div>
  
  <div class="footer">
    Auto-generated by BuildWise Intelligence | Project: {{projectName}}
  </div>
</body>
</html>
